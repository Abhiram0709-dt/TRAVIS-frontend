<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAVIS - Telugu Banking Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>TRAVIS</h1>
            <p class="subtitle">Telugu Banking Assistant</p>
        </header>

        <main>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">
                        <p>నమస్కారం! నేను మీ బ్యాంకింగ్ సహాయకుడు. మీరు ఏమి తెలుసుకోవాలనుకుంటున్నారు?</p>
                        <p class="translation">Hello! I'm your banking assistant. What would you like to know?</p>
                    </div>
                </div>

                <div class="input-container">
                    <textarea id="userInput" placeholder="Type your question here..."></textarea>
                    <button id="sendButton">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2024 TRAVIS - Telugu Banking Assistant</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
