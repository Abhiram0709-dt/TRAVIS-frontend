services:
  - type: web
    name: travis-banking-assistant
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python download_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
      - key: SECRET_KEY
        sync: false 